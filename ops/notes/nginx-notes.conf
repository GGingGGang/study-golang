# Redirect /notes to /notes/
location = /notes {
    allow 127.0.0.1;
    allow 100.64.0.0/10;
    deny all;
    return 301 /notes/;
}

# Block hidden files and directories (.obsidian, .git, dotfiles)
location ~ ^/notes/(?:|.*?/)\.[^/]+ {
    allow 127.0.0.1;
    allow 100.64.0.0/10;
    deny all;
    return 403;
}

# Markdown content with short cache
location ~* ^/notes/content/.*\.md$ {
    allow 127.0.0.1;
    allow 100.64.0.0/10;
    deny all;

    root /var/www;
    autoindex off;
    expires 30s;
    add_header Cache-Control "public, max-age=30, must-revalidate" always;
    try_files $uri =404;
}

# Other content under /notes/content/
location /notes/content/ {
    allow 127.0.0.1;
    allow 100.64.0.0/10;
    deny all;

    root /var/www;
    autoindex on;
    try_files $uri $uri/ =404;
}

# Viewer assets under /notes/
location /notes/ {
    allow 127.0.0.1;
    allow 100.64.0.0/10;
    deny all;

    root /var/www;
    autoindex off;
    index index.html;
    try_files $uri $uri/ =404;
}
